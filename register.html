<!-- form  -->
    <section id="register">
        <h1>Event Registration Form</h1>

        <form id="eventForm">
            <fieldset class="fieldset">
                <legend>Full Name</legend>
                <input type="text" id="name" required minlength="3" placeholder="Enter your name">
            </fieldset>
        
            <fieldset class="fieldset">
                <legend>Email</legend>
                <input type="email" id="email" required placeholder="example@gmail.com">
            </fieldset>
        
            <fieldset class="fieldset">
                <legend>Phone Number</legend>
                <input type="tel" id="phone" pattern="[0-9]{10}" required placeholder="10-digit phone number">
            </fieldset>

            <label for="ticket"><b>Ticket Type</b></label>
            <select id="ticket">
                <option>Standard</option>
                <option>Premium</option>
            </select>

            <label><b>Mode of Attendance</b></label>

            <label class="radio-option">
                ONLINE<input type="radio" name="mode" value="online" required>
            </label>

            <label class="radio-option">
                OFLINE<input type="radio" name="mode" value="offline" required>
            </label>

            <label class="checkbox-option">
                <b>I agree to the terms & conditions</b>
                <input type="checkbox" required>
            </label>

            <input type="submit" value="Register">
        </form>
    </section>

    <div id="modal">
        <div id="modalContent">
            <h2>Registration Successful 🎉</h2>
            <p id="modalText"></p>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>
