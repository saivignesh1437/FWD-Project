<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLH EVENT</title>
<style>
    /* root elements */
    :root {
        --bg-color: rgb(244, 246, 248);
        --card-bg: rgb(204, 188, 188);
        --primary: rgb(30, 64, 175);
        --accent: rgba(150, 5, 5, 0.98);
        --text-color: black;
        --border-color: rgb(30,41,59);

    }

    /* dark mode */
    body.dark {
        --bg-color: rgb(15, 23, 42);
        --card-bg: rgb(30, 41, 59);
        --text-color: rgb(248, 250, 252);
        --border-color: rgb(223, 119, 119);
    }

    body.dark button{
        background-color: aliceblue;
        color: black;
    }

    /* global styles */
    body {
        font-family: "Times New Roman", Arial, sans-serif;
        font-size: medium;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        transition: background-color 0.5s, color 0.5s;
    }

    h1, h2, h3 {
        color: var(--accent);
    }

    /* header & navbar */
    header {
        background: rgb(2, 4, 12);
        padding: 15px 30px;
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    nav ul {
        display: flex;
        list-style: none;
        gap: 15px;
        margin-left: auto;
        margin-right: 20px;


    }

    nav a {
        color: rgb(217, 24, 24);
        text-decoration: none;
        transition: color 0.3s;
    }

    nav a:hover {
        color: white;
    }

    /* grid  */
    main {
        display: grid;
        grid-template-columns: 3fr 1fr;
        grid-template-areas:
            "about aside";
        gap: calc(10px + 1vw);
        padding: 20px;
    }

    section, aside {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 15px;
        animation: fadeIn 1s ease-in;
    }

    #about{
        grid-area: about;
    }

    aside{
        grid-area: aside;
    }

    aside ul{
        margin: 0;
        padding-left: 15px;
    }

    aside iframe{
        width: 100%;
        height: auto;

    }

    /* pseudo element  */
    section h2::before {
        content: "★ ";
        color: gold;
    }

    aside h3::after {
        content: " ★";
        color: gold;
    }

    /* table  */
    caption{
        font-weight: 1000;
    }
    table {
        width: 100%;
        border-collapse: collapse;
    }

    th, td {
        border: 2px solid var(--border-color);
        padding: 10px;
        text-align: center;
    }

    tr:hover {
        background-color: rgba(0,0,0,0.1);
    }

    /* form  */
    form {
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 400px;
    }

    .fieldset {
    border: 2px solid grey;
    border-radius: 8px;
    padding: 5px 12px 14px;
    }

    .fieldset legend {
        padding: 0 8px;
        font-weight: bold;
        color: var(--text-color);
    }

    .radio-option,.checkbox-option {
        display: flex;
        align-items: center;
        gap: 8px; 
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        box-sizing: border-box;
    }

    input[type="submit"] {
        background: var(--primary);
        color: white;
        border: none;
        padding: 10px;
        transition: transform 0.3s, background 0.3s;
    }

    input[type="submit"]:hover {
        transform: scale(1.05);
        background: rgb(29, 78, 216);
    }

    /* pseudo class */
    input:focus {
        outline: 2px solid var(--primary);
    }

    input:checked {
        accent-color: green;
    }

    input[type="radio"]:focus,
    input[type="checkbox"]:focus {
        outline: none;
        box-shadow: none;
    }

    form label{
        color: var(--text-color);
    }

    /* media  */
    img {
        display: block;
        margin: auto;
        margin-bottom: 20px;
        margin-top: 20px;
    }

    video {
        margin-top: 5px;
        width: 100%;
        max-height: 400px;
    }

    audio {
        width: 100%;
        margin-top: 30px;
    }

    .iframe{
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
    }

    img, video, iframe {
        transition: transform 0.3s ease;
        max-width: 100%;
        height: auto;
    }

    /* announcement marquee */
    .announcement{
        width:100%;
        overflow:hidden;
        background:rgba(175, 29, 29, 0.925);
        color:white;
        font-weight:bold;
        padding:8px 0;
        position:relative;
    }

    .announcement span{
        display:inline-block;
        padding-left:100%;
        white-space:nowrap;
        animation: marqueeMove 12s linear infinite;
    }

    /* footer  */
    footer{
        text-align: center;
        background-color: rgb(30, 41, 59);
        color: rgb(243, 246, 248);
    }

    /* animations */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes marqueeMove{
        0%{ transform: translateX(0); }
        100%{ transform: translateX(-100%); }
    }


    img:hover {
        transform: scale(1.02);
    }

    /* media queries */
    @media (max-width: 750px) {
        main {
            grid-template-columns: 1fr;
            grid-template-areas:
                "about"
                "aside";
        }
        #register form{
            margin: 0 auto;
            width: 100%;
            max-width: 400px;
        }
        nav ul {
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        aside iframe {
            width: 100%;
            height: auto;
        }
        #countdown{
            justify-content:center;
        }
    }

    button{
        background-color: rgb(0, 0, 0);
        border-radius: 10px;

    }

    #countdown{
        display:flex;
        justify-content:space-between;
        gap:10px;
        margin-bottom:20px;
        flex-wrap: wrap;
    }

    .time-box{
        flex:1 1 120px;
        background:black;
        color:rgba(140, 43, 43, 0.98);
        padding:10px;
        border-radius:10px;
        text-align:center;
        font-weight:bold;
    }

    .time-box span{
        font-size:20px;
        display:block;
    }

    .time-box small{
        font-size:12px;
        opacity:0.8;
    }


    #topBtn{
        position:fixed;
        bottom:20px;
        right:20px;
        padding:10px;
        font-size:18px;
        display:none;
        cursor:pointer;
    }

    #modal{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.6);
        display:none;
        justify-content:center;
        align-items:center;
    }

    #modalContent{
        background:white;
        padding:20px;
        border-radius:10px;
        text-align:center;
    }

</style>
</head>
